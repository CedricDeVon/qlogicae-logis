[tool.mypy]
files = ["library"]
strict = true
# python_version = "3.12"
# namespace_packages = true
# explicit_package_bases = true
# show_error_codes = true
# pretty = true
# color_output = true
# show_column_numbers = true
# show_error_context = true


[tool.ruff]
target-version = "py312"
line-length = 88
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    ".output",
    "output",
    ".outputs",
    "outputs",
    ".dist",
    "dist",
    ".build",
    "build",
    ".pytest_cache",
    ".ruff_cache",
    ".mypy_cache",
    ".tox",
    ".nox",
    ".idea",
    ".vscode",
]


[tool.ruff.lint]
select = [    
    "E",
    "W", # pycodestyle    
    "F", # Pyflakes    
    "I", # isort    
    "UP", # pyupgrade    
    "B", # flake8-bugbear
    "PTH", # pathlib
]
ignore = [    
    "S607",    
    "S101", # allow assert statements    
    "S603", # allow subprocess usage
    "PLR2004", # allow magic values
]
fixable = ["ALL"]
unfixable = []


[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
docstring-code-format = true
docstring-code-line-length = "dynamic"
skip-magic-trailing-comma = false